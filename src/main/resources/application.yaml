spring:
  application:
    name: core

  config:
    import: optional:file:.env[.properties]

  jackson:
    property-naming-strategy: SNAKE_CASE

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7
          max-tokens: 1500
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

  datasource:
    url: ${DB_URL}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jpa:
    hibernate:
      ddl-auto: update # first: create after: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        show_sql: true
        jdbc:
          batch_size: 100
        order_inserts: true
        order_updates: true
    open-in-view: false

  cloud:
    compatibility-verifier:
      enabled: false
    openfeign:
      client:
        config:
          default:
            connectTimeout: 10000
            readTimeout: 300000

  security:
    oauth2:
      client:
        registration:
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            client-name: Naver
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/naver"
            scope: name,email
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
jwt:
  secret: ${JWT_SECRET}
  access-token-validity: ${JWT_ACCESS_VALIDITY:3600}
  refresh-token-validity: ${JWT_REFRESH_VALIDITY:1209600}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    persistAuthorization: true
  override-with-generic-response: false

ai:
  server:
    url: http://localhost:8000

news:
  api:
    key: ${EVENT_REGISTRY_API_KEY}
    base-url: https://eventregistry.org/api/v1

app:
  oauth2:
    redirect-uri: /auth/callback.html

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
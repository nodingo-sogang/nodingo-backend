services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nodingo-postgres
    deploy:
      resources:
        limits:
          memory: 4096M
        reservations:
          memory: 2048M
    environment:
      POSTGRES_DB: nodingo
      POSTGRES_USER: nodingo_user
      POSTGRES_PASSWORD: "20200129"
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nodingo_user -d nodingo"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nodingo-redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data